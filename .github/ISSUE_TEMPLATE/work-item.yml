name: Method work item
description: Propose shaped Method work with a hill, scope, and witness plan.
title: ""
labels:
  - lane:inbox
body:
  - type: markdown
    attributes:
      value: |
        Use a short, branch-safe title. Active work uses a branch slug derived from this title.
  - type: dropdown
    id: lane
    attributes:
      label: Lane
      description: The Method lane for this work.
      options:
        - lane:inbox
        - lane:asap
        - lane:bad-code
        - lane:cool-ideas
        - lane:release
      default: 0
    validations:
      required: true
  - type: dropdown
    id: legend
    attributes:
      label: Legend
      description: Repo-local Method legend.
      options:
        - legend:process
        - legend:synth
        - legend:core
      default: 0
    validations:
      required: true
  - type: textarea
    id: hill
    attributes:
      label: Hill
      description: Name the user value in Method/IBM Design Thinking style.
      placeholder: As a contributor, I want ..., so that ...
    validations:
      required: true
  - type: textarea
    id: sponsored-perspectives
    attributes:
      label: Sponsored perspectives
      description: Name abstract human and agent seats, not literal people or model brands.
      value: |
        Human:
        Agent:
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What repo truth, user need, or defect motivates this work?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in bounds?
      placeholder: |
        - ...
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should not be solved in this issue?
      placeholder: |
        - ...
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that prove the issue is complete.
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: witness
    attributes:
      label: Witness plan
      description: Expected evidence for tests, playback, docs, and retro.
      value: |
        Expected evidence:
        - tests:
        - playback:
        - docs:
        - retro:
    validations:
      required: true
  - type: textarea
    id: method-artifacts
    attributes:
      label: Method artifacts
      description: Fill these links as the work proceeds.
      value: |
        Design:
        Witness:
        Retro:
        PR:
